[build]
  command = "npm run build"
  publish = "dist"
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 9500
  targetPort = 4567
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
